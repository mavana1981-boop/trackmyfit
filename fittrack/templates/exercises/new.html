{% extends 'base.html' %}
{% block title %}Novo Exercício{% endblock %}
{% block topbar %}
<div class="topbar">
    <a href="{{ url_for('exercises.index') }}" class="topbar-back">←</a>
    <h1>NOVO EXERCÍCIO</h1>
</div>
{% endblock %}
{% block content %}
<div class="content">
    <form method="POST">
        <div class="card" style="margin-bottom:12px;">
            <div class="form-group">
                <label class="form-label">Nome do exercício *</label>
                <input type="text" name="name" class="form-control" placeholder="Ex: Rosca Scott" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Grupo muscular *</label>
                <select name="muscle_group_id" class="form-control" required>
                    <option value="">Selecione...</option>
                    {% for g in groups %}
                    <option value="{{ g.id }}">{{ g.icon }} {{ g.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Dificuldade</label>
                <select name="difficulty" class="form-control">
                    <option value="Iniciante">Iniciante</option>
                    <option value="Intermediário" selected>Intermediário</option>
                    <option value="Avançado">Avançado</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Equipamento</label>
                <input type="text" name="equipment" class="form-control" placeholder="Ex: Haltere, Barra, Sem equipamento">
            </div>
            <div class="form-group">
                <label class="form-label">Descrição</label>
                <textarea name="description" class="form-control" rows="2" placeholder="Músculos trabalhados, objetivo..."></textarea>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">Como executar</label>
                <textarea name="instructions" class="form-control" rows="3" placeholder="Passo a passo da execução..."></textarea>
            </div>
        </div>
        <button type="submit" class="btn btn-red btn-block btn-lg">✓ Criar Exercício</button>
    </form>
</div>
{% endblock %}
