<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack — Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --red:#E8352A; --red-dim:#B82820; --bg:#111111; --bg2:#161616; --bg4:#242424; --border2:rgba(255,255,255,0.11); --text:#FFFFFF; --text2:#AAAAAA; --text3:#666666; --text4:#444444; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .topbar { background:var(--bg2); border-bottom:1px solid rgba(255,255,255,0.06); padding:14px 20px; display:flex; align-items:center; gap:12px; }
        .topbar a { color:var(--red); text-decoration:none; font-size:1.3rem; }
        .topbar h1 { font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
        .form-wrap { padding:24px 20px; max-width:420px; margin:0 auto; }
        .form-group { margin-bottom:16px; }
        .form-label { font-family:'Syne',sans-serif; font-weight:700; font-size:0.65rem; color:var(--text3); display:block; margin-bottom:7px; text-transform:uppercase; letter-spacing:1px; }
        .form-control { width:100%; padding:14px 16px; border:1.5px solid var(--border2); border-radius:9px; font-family:'DM Sans',sans-serif; font-size:0.95rem; color:var(--text); background:var(--bg4); outline:none; transition:border-color 0.15s; }
        .form-control:focus { border-color:var(--red); }
        .form-control::placeholder { color:var(--text4); }
        .btn-red { width:100%; padding:15px; border-radius:9px; background:var(--red); color:white; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:800; border:none; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px; }
        .btn-red:hover { background:var(--red-dim); }
        .footer-link { text-align:center; margin-top:20px; font-size:0.85rem; color:var(--text3); }
        .footer-link a { color:var(--red); font-weight:600; text-decoration:none; }
        .alert { padding:12px 16px; border-radius:9px; font-size:0.85rem; margin-bottom:14px; }
        .alert-error   { background:rgba(232,53,42,0.1); color:var(--red); border:1px solid rgba(232,53,42,0.2); }
        .alert-success { background:rgba(46,204,113,0.1); color:#2ECC71; }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="{{ url_for('auth.login') }}">←</a>
        <h1>Criar Conta</h1>
    </div>
    <div class="form-wrap" style="margin-top:8px;">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group"><label class="form-label">Nome</label><input type="text" name="name" class="form-control" placeholder="Seu nome" required autofocus></div>
            <div class="form-group"><label class="form-label">E-mail</label><input type="email" name="email" class="form-control" placeholder="seu@email.com" required></div>
            <div class="form-group"><label class="form-label">Senha</label><input type="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required></div>
            <div class="form-group" style="margin-bottom:22px;"><label class="form-label">Confirmar Senha</label><input type="password" name="confirm_password" class="form-control" placeholder="Repita a senha" required></div>
            <button type="submit" class="btn-red">Criar Conta</button>
        </form>
        <div class="footer-link">Já tem conta? <a href="{{ url_for('auth.login') }}">Entrar</a></div>
    </div>
</body>
</html>
