<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack — Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent:#FF5E2C; --bg:#0D0D0F; --bg2:#141416; --bg4:#242428; --border2:rgba(255,255,255,0.12); --text:#F0F0F0; --text2:#A0A0A8; --text3:#606068; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .topbar { background:var(--bg2); border-bottom:1px solid rgba(255,255,255,0.07); padding:14px 20px; display:flex; align-items:center; gap:12px; }
        .topbar a { color:var(--accent); text-decoration:none; font-size:1.3rem; }
        .topbar h1 { font-family:'Syne',sans-serif; font-size:1.15rem; font-weight:800; }
        .form-wrap { padding:24px 20px; max-width:420px; margin:0 auto; }
        .form-group { margin-bottom:16px; }
        .form-label { font-family:'Syne',sans-serif; font-weight:700; font-size:0.72rem; color:var(--text2); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
        .form-control { width:100%; padding:14px 16px; border:1.5px solid var(--border2); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:1rem; color:var(--text); background:var(--bg4); outline:none; transition:border-color 0.15s; }
        .form-control:focus { border-color:var(--accent); }
        .form-control::placeholder { color:var(--text3); }
        .btn-accent { width:100%; padding:15px; border-radius:12px; background:var(--accent); color:white; font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; border:none; cursor:pointer; }
        .footer-link { text-align:center; margin-top:20px; font-size:0.88rem; color:var(--text2); }
        .footer-link a { color:var(--accent); font-weight:600; text-decoration:none; }
        .alert { padding:12px 16px; border-radius:10px; font-size:0.88rem; margin-bottom:14px; }
        .alert-error { background:rgba(255,69,58,0.1); color:#FF453A; border:1px solid rgba(255,69,58,0.2); }
        .alert-success { background:rgba(48,209,88,0.1); color:#30D158; }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="{{ url_for('auth.login') }}">←</a>
        <h1>Criar Conta</h1>
    </div>
    <div class="form-wrap">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST" style="margin-top:8px;">
            <div class="form-group"><label class="form-label">Nome</label><input type="text" name="name" class="form-control" placeholder="Seu nome" required autofocus></div>
            <div class="form-group"><label class="form-label">E-mail</label><input type="email" name="email" class="form-control" placeholder="seu@email.com" required></div>
            <div class="form-group"><label class="form-label">Senha</label><input type="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required></div>
            <div class="form-group" style="margin-bottom:24px;"><label class="form-label">Confirmar Senha</label><input type="password" name="confirm_password" class="form-control" placeholder="Repita a senha" required></div>
            <button type="submit" class="btn-accent">Criar Conta</button>
        </form>
        <div class="footer-link">Já tem conta? <a href="{{ url_for('auth.login') }}">Entrar</a></div>
    </div>
</body>
</html>
