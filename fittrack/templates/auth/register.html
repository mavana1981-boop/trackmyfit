<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack — Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--red:#E8192C;--bg:#0D0D0D;--bg2:#161616;--bg4:#272727;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);--text:#FFFFFF;--text2:#8A8A8A;--text3:#3E3E3E;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
        .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;}
        .topbar a{color:var(--red);text-decoration:none;font-size:1.3rem;}
        .topbar h1{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;}
        .form-wrap{padding:24px 20px;max-width:420px;margin:0 auto;}
        .form-label{font-size:0.65rem;font-weight:700;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.8px;}
        .form-control{width:100%;padding:13px 15px;border:1px solid var(--border2);border-radius:10px;font-family:'Inter',sans-serif;font-size:0.95rem;color:var(--text);background:var(--bg4);outline:none;transition:border-color 0.15s;}
        .form-control:focus{border-color:var(--red);}
        .form-control::placeholder{color:var(--text3);}
        .form-group{margin-bottom:14px;}
        .btn-red{width:100%;padding:15px;border-radius:10px;background:var(--red);color:white;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;border:none;cursor:pointer;}
        .footer-link{text-align:center;margin-top:20px;font-size:0.84rem;color:var(--text2);}
        .footer-link a{color:var(--red);font-weight:600;text-decoration:none;}
        .alert{padding:11px 14px;border-radius:9px;font-size:0.84rem;margin-bottom:12px;}
        .alert-error{background:rgba(255,69,58,0.1);color:#FF453A;border:1px solid rgba(255,69,58,0.18);}
    </style>
</head>
<body>
    <div class="topbar"><a href="{{ url_for('auth.login') }}">←</a><h1>CRIAR CONTA</h1></div>
    <div class="form-wrap">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST" style="margin-top:8px;">
            <div class="form-group"><label class="form-label">Nome</label><input type="text" name="name" class="form-control" placeholder="Seu nome" required autofocus></div>
            <div class="form-group"><label class="form-label">E-mail</label><input type="email" name="email" class="form-control" placeholder="seu@email.com" required></div>
            <div class="form-group"><label class="form-label">Senha</label><input type="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required></div>
            <div class="form-group" style="margin-bottom:24px;"><label class="form-label">Confirmar senha</label><input type="password" name="confirm_password" class="form-control" required></div>
            <button type="submit" class="btn-red">CRIAR CONTA</button>
        </form>
        <div class="footer-link">Já tem conta? <a href="{{ url_for('auth.login') }}">Entrar</a></div>
    </div>
</body>
</html>
