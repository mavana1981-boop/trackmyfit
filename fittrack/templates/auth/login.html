<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent:#FF5E2C; --bg:#0D0D0F; --bg3:#1C1C1F; --bg4:#242428; --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12); --text:#F0F0F0; --text2:#A0A0A8; --text3:#606068; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
        .hero { background: linear-gradient(160deg, #1A0A05 0%, #0D0D0F 60%); padding: 64px 24px 48px; text-align:center; position:relative; overflow:hidden; }
        .hero::before { content:''; position:absolute; top:-60px; left:50%; transform:translateX(-50%); width:300px; height:300px; border-radius:50%; background:radial-gradient(circle, rgba(255,94,44,0.15) 0%, transparent 70%); }
        .hero-icon { font-size:3.5rem; margin-bottom:14px; position:relative; }
        .hero h1 { font-family:'Syne',sans-serif; font-size:2.4rem; font-weight:800; letter-spacing:-1px; position:relative; }
        .hero h1 span { color:var(--accent); }
        .hero p { color:var(--text2); margin-top:6px; font-size:0.92rem; position:relative; }
        .form-wrap { padding:32px 20px; max-width:420px; margin:0 auto; width:100%; flex:1; }
        .form-label { font-family:'Syne',sans-serif; font-weight:700; font-size:0.72rem; color:var(--text2); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
        .form-control { width:100%; padding:14px 16px; border:1.5px solid var(--border2); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:1rem; color:var(--text); background:var(--bg4); outline:none; transition:border-color 0.15s; }
        .form-control:focus { border-color:var(--accent); }
        .form-control::placeholder { color:var(--text3); }
        .form-group { margin-bottom:16px; }
        .btn-accent { width:100%; padding:15px; border-radius:12px; background:var(--accent); color:white; font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; border:none; cursor:pointer; transition:background 0.15s; letter-spacing:0.2px; }
        .btn-accent:hover { background:#CC4A20; }
        .footer-link { text-align:center; margin-top:20px; font-size:0.88rem; color:var(--text2); }
        .footer-link a { color:var(--accent); font-weight:600; text-decoration:none; }
        .alert { padding:12px 16px; border-radius:10px; font-size:0.88rem; margin-bottom:16px; }
        .alert-error { background:rgba(255,69,58,0.1); color:#FF453A; border:1px solid rgba(255,69,58,0.2); }
        .alert-success { background:rgba(48,209,88,0.1); color:#30D158; border:1px solid rgba(48,209,88,0.2); }
        .alert-info { background:rgba(255,94,44,0.1); color:var(--accent); border:1px solid rgba(255,94,44,0.2); }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-icon">🏋️</div>
        <h1>Fit<span>Track</span></h1>
        <p>Seu treino, sua evolução</p>
    </div>
    <div class="form-wrap">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-accent">Entrar</button>
        </form>
        <div class="footer-link" style="margin-top:24px;">
            Não tem conta? <a href="{{ url_for('auth.register') }}">Cadastre-se</a>
        </div>
    </div>
</body>
</html>
