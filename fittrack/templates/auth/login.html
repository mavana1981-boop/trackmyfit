<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --coral: #E8623A; --coral-dark: #C44E2A; --coral-pale: #FFF0EC; --dark: #1A1A1A; --border: #EBEBEB; }
        body { font-family: 'DM Sans', sans-serif; background: #F7F5F3; min-height: 100vh; display: flex; flex-direction: column; }
        .hero {
            background: var(--coral);
            padding: 60px 24px 48px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -60px; left: -30px;
            width: 160px; height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
        }
        .hero-icon { font-size: 3.5rem; margin-bottom: 12px; }
        .hero h1 { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; color: white; letter-spacing: -1px; }
        .hero p { color: rgba(255,255,255,0.8); margin-top: 6px; font-size: 0.95rem; }
        .form-wrap { padding: 32px 20px; max-width: 420px; margin: 0 auto; width: 100%; }
        .form-group { margin-bottom: 16px; }
        .form-label { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; color: #555; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
        .form-control { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--dark); background: white; outline: none; transition: border-color 0.15s; }
        .form-control:focus { border-color: var(--coral); }
        .btn-coral { width: 100%; padding: 15px; border-radius: 14px; background: var(--coral); color: white; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; border: none; cursor: pointer; transition: background 0.15s; letter-spacing: 0.3px; }
        .btn-coral:hover { background: var(--coral-dark); }
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #888; }
        .footer-link a { color: var(--coral); font-weight: 600; text-decoration: none; }
        .alert { padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 16px; }
        .alert-error { background: #FEE; color: #E74C3C; border: 1px solid #FCC; }
        .alert-success { background: #EFFFEF; color: #27AE60; border: 1px solid #C3EFC3; }
        .alert-info { background: var(--coral-pale); color: var(--coral-dark); border: 1px solid #F7C4B4; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-icon">🏋️</div>
        <h1>FitTrack</h1>
        <p>Seu treino, sua evolução</p>
    </div>
    <div class="form-wrap">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                    <div class="alert alert-{{ cat }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-coral">Entrar</button>
        </form>
        <div class="footer-link">
            Não tem conta? <a href="{{ url_for('auth.register') }}">Cadastre-se</a>
        </div>
    </div>
</body>
</html>
