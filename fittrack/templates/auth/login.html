<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--red:#E8192C;--bg:#0D0D0D;--bg2:#161616;--bg4:#272727;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);--text:#FFFFFF;--text2:#8A8A8A;--text3:#3E3E3E;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
        .hero{background:var(--bg2);padding:64px 24px 48px;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--border);}
        .hero::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(232,25,44,0.12) 0%,transparent 70%);}
        .hero-icon{font-size:3rem;margin-bottom:16px;position:relative;}
        .hero h1{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:2px;position:relative;line-height:1;}
        .hero h1 span{color:var(--red);}
        .hero p{color:var(--text2);margin-top:8px;font-size:0.88rem;position:relative;letter-spacing:0.3px;}
        .form-wrap{padding:32px 20px;max-width:420px;margin:0 auto;width:100%;flex:1;}
        .form-label{font-size:0.65rem;font-weight:700;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.8px;}
        .form-control{width:100%;padding:13px 15px;border:1px solid var(--border2);border-radius:10px;font-family:'Inter',sans-serif;font-size:0.95rem;color:var(--text);background:var(--bg4);outline:none;transition:border-color 0.15s;}
        .form-control:focus{border-color:var(--red);}
        .form-control::placeholder{color:var(--text3);}
        .form-group{margin-bottom:16px;}
        .btn-red{width:100%;padding:15px;border-radius:10px;background:var(--red);color:white;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;border:none;cursor:pointer;transition:background 0.15s;}
        .btn-red:hover{background:#B5101F;}
        .footer-link{text-align:center;margin-top:20px;font-size:0.84rem;color:var(--text2);}
        .footer-link a{color:var(--red);font-weight:600;text-decoration:none;}
        .alert{padding:11px 14px;border-radius:9px;font-size:0.84rem;margin-bottom:14px;}
        .alert-error{background:rgba(255,69,58,0.1);color:#FF453A;border:1px solid rgba(255,69,58,0.18);}
        .alert-success{background:rgba(48,209,88,0.1);color:#30D158;}
        .alert-info{background:rgba(232,25,44,0.1);color:var(--red);}
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-icon">🏋️</div>
        <h1>FIT<span>TRACK</span></h1>
        <p>SEU TREINO. SUA EVOLUÇÃO.</p>
    </div>
    <div class="form-wrap">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group"><label class="form-label">E-mail</label><input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus></div>
            <div class="form-group" style="margin-bottom:24px;"><label class="form-label">Senha</label><input type="password" name="password" class="form-control" placeholder="••••••••" required></div>
            <button type="submit" class="btn-red">ENTRAR</button>
        </form>
        <div class="footer-link" style="margin-top:24px;">Não tem conta? <a href="{{ url_for('auth.register') }}">Cadastre-se</a></div>
    </div>
</body>
</html>
