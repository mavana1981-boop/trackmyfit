<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --red:#E8352A; --red-dim:#B82820; --bg:#111111; --bg3:#1E1E1E; --bg4:#242424; --border2:rgba(255,255,255,0.11); --text:#FFFFFF; --text2:#AAAAAA; --text3:#666666; --text4:#444444; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
        .hero {
            padding:64px 24px 48px; text-align:center; position:relative; overflow:hidden;
            background: radial-gradient(ellipse at 50% 0%, rgba(232,53,42,0.12) 0%, transparent 70%), var(--bg);
        }
        .hero-icon { font-size:3.5rem; margin-bottom:16px; }
        .hero-title { font-family:'Syne',sans-serif; font-size:2.8rem; font-weight:800; letter-spacing:-1.5px; line-height:1; }
        .hero-title span { color:var(--red); }
        .hero-sub { color:var(--text3); margin-top:8px; font-size:0.85rem; text-transform:uppercase; letter-spacing:1.5px; font-weight:600; font-family:'Syne',sans-serif; }
        .form-wrap { padding:32px 20px 40px; max-width:420px; margin:0 auto; width:100%; flex:1; }
        .form-label { font-family:'Syne',sans-serif; font-weight:700; font-size:0.65rem; color:var(--text3); display:block; margin-bottom:7px; text-transform:uppercase; letter-spacing:1px; }
        .form-control { width:100%; padding:14px 16px; border:1.5px solid var(--border2); border-radius:9px; font-family:'DM Sans',sans-serif; font-size:0.95rem; color:var(--text); background:var(--bg4); outline:none; transition:border-color 0.15s; }
        .form-control:focus { border-color:var(--red); }
        .form-control::placeholder { color:var(--text4); }
        .form-group { margin-bottom:16px; }
        .btn-red { width:100%; padding:15px; border-radius:9px; background:var(--red); color:white; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:800; border:none; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px; transition:background 0.15s; margin-top:6px; }
        .btn-red:hover { background:var(--red-dim); }
        .footer-link { text-align:center; margin-top:22px; font-size:0.85rem; color:var(--text3); }
        .footer-link a { color:var(--red); font-weight:600; text-decoration:none; }
        .alert { padding:12px 16px; border-radius:9px; font-size:0.85rem; margin-bottom:16px; }
        .alert-error   { background:rgba(232,53,42,0.1); color:var(--red); border:1px solid rgba(232,53,42,0.2); }
        .alert-success { background:rgba(46,204,113,0.1); color:#2ECC71; border:1px solid rgba(46,204,113,0.2); }
        .alert-info    { background:rgba(232,53,42,0.06); color:var(--text2); border:1px solid var(--border2); }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-icon">🏋️</div>
        <div class="hero-title">FIT<span>TRACK</span></div>
        <div class="hero-sub">Seu treino, sua evolução</div>
    </div>
    <div class="form-wrap">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
            </div>
            <div class="form-group" style="margin-bottom:22px;">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-red">Entrar</button>
        </form>
        <div class="footer-link" style="margin-top:24px;">
            Não tem conta? <a href="{{ url_for('auth.register') }}">Cadastre-se</a>
        </div>
    </div>
</body>
</html>
